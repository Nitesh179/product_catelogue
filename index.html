<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Premium Catalogue | Dryfroot™</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400&family=Montserrat:wght@300;500;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="mobile-wrapper">
    <header class="premium-header">
        <img src="images/named2-logo.png" alt="Brand Logo" class="brand-logo" onerror="this.src='images/icon_logo.png'">
    </header>

    <section class="hero-section">
        <h1 class="hero-title">FLAVOR REVOLUTION IN EVERY BITE</h1>
        <p class="hero-subtitle">Discover our premium range of handcrafted delights.</p>
    </section>

    <div class="new-arrival-carousel">
        <div id="arrivalCarousel" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
                <button type="button" data-bs-target="#arrivalCarousel" data-bs-slide-to="0" class="active"></button>
                <button type="button" data-bs-target="#arrivalCarousel" data-bs-slide-to="1"></button>
                <button type="button" data-bs-target="#arrivalCarousel" data-bs-slide-to="2"></button>
            </div>
            <div class="carousel-inner">
                <div class="carousel-item active" data-bs-interval="3000">
                    <img src="images/banner1.jpg" alt="Arrival 1">
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img src="images/banner1.jpg" alt="Arrival 2">
                </div>
                <div class="carousel-item" data-bs-interval="3000">
                    <img src="images/banner1.jpg" alt="Arrival 3">
                </div>
            </div>
        </div>
    </div>

    <div class="category-scroll">
        <button class="filter-btn active" data-filter="all">📃 All</button>
        <button class="filter-btn" data-filter="bestseller">⭐ Best Sellers</button>
        <button class="filter-btn" data-filter="hampers">🎁 Gift Hampers</button>
        <button class="filter-btn" data-filter="cashews">🌶️ Spicy Cashews</button>
        <button class="filter-btn" data-filter="almonds">🍩 Sweet Almonds</button>
        <button class="filter-btn" data-filter="chocolates">🍫 Chocolates</button>
    </div>

    <div class="product-grid container-fluid">
        <div class="row g-3" id="productContainer">
            <div class="col-6 product-item cashews">
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <img src="images/peri-peri-cashew.png" alt="Peri Peri Cashew" class="product-img">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">Peri Peri</h3>
                        <span class="product-tag">Cashew</span>
                        <div class="product-price-box">
                            <span class="selling-price">Rs 320/-</span>
                            <span class="mrp-price">(399/- MRP)</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-6 product-item almonds bestseller">
                <div class="product-card">
                    <div class="product-img-wrapper">
                        <img src="images/tiramisu-almonds.png" alt="Tiramisu Almonds" class="product-img">
                    </div>
                    <div class="product-info">
                        <h3 class="product-title">Tiramisu</h3>
                        <span class="product-tag">Almond</span>
                        <div class="product-price-box">
                            <span class="selling-price">Rs 260/-</span>
                            <span class="mrp-price">(299/- MRP)</span>
                        </div>
                    </div>
                </div>
            </div>
            
            </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script> </body>
</html>
