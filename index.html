<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dryfroots | Catalogue</title>

  <!-- CSS -->
  <link rel="stylesheet" href="style.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Lora:wght@400;700&display=swap" rel="stylesheet">

  <link rel="icon" type="image/jpeg" href="images/favicon.png">
  <link rel="apple-touch-icon" href="images/favicon.png">

  <link rel="stylesheet" href="style.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#D4A373">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

</head>

<body>

  <div class="page-wrapper">
    <div class="app-container">

      <!-- HEADER -->
      <div class="header">
        <img src="images/named2-logo.png" alt="Dryfroots" class="brand-logo">
      </div>

      <!-- HERO -->
      <div class="hero">
        <div class="hero-title">FLAVOR REVOLUTION IN <br> EVERY BITE</div>
        <div class="hero-sub">Discover our premium range of handcrafted delights.</div>
      </div>  

      <!-- BANNER CAROUSEL (Working Now) -->
    <div id="bannerCarousel" class="carousel slide px-3 mb-4" data-bs-ride="carousel">
        <div class="carousel-indicators">
          <button type="button" data-bs-target="#bannerCarousel" data-bs-slide-to="0" class="active"></button>
          <button type="button" data-bs-target="#bannerCarousel" data-bs-slide-to="1"></button>
          <button type="button" data-bs-target="#bannerCarousel" data-bs-slide-to="2"></button>
        </div>
        <div class="carousel-inner shadow-gold">
          <div class="carousel-item active" data-bs-interval="3000">
            <img src="images/banner1.jpg" class="d-block w-100" alt="Banner 1">
          </div>
          <div class="carousel-item" data-bs-interval="3000">
            <img src="images/banner2.png" class="d-block w-100" alt="Banner 2">
          </div>
          <div class="carousel-item" data-bs-interval="3000">
            <img src="images/banner3.png" class="d-block w-100" alt="Banner 3">
          </div>
        </div>
      </div>

      <!-- CATEGORY BAR (Do not update design) -->
      <div id="categoryBar" class="category-bar"></div>

      <!-- PRODUCT GRID -->
      <div id="productGrid" class="product-grid"></div>

    </div>
  </div>

  <!-- CART BUTTON (Icon yaha hai!) -->
  <button class="cart-fab" onclick="toggleCart()">
    <i class="bi bi-bag-dash-fill" style="font-size: 23px;"></i>
    <div id="cartBadge" class="cart-badge hidden">0</div>
  </button>

  <!-- CART OVERLAY -->
  <div id="cartOverlay" class="cart-overlay">
    <div class="cart-panel">
      <div class="cart-header">
        <div class="cart-title">Your Cart</div>
        <button class="cart-close" onclick="toggleCart()"><i class="bi bi-x-lg"></i></button>
      </div>
      <div id="cartItems" class="cart-items"></div>
      <div class="cart-footer">
        <div class="cart-total-row">
          <span>Total</span>
          <span id="cartTotal" class="cart-total-amount">₹ 0</span>
        </div>
        <button id="btnWhatsapp" class="btn-whatsapp" onclick="placeOrder()">Place Order</button>
      </div>
    </div>
  </div>

  <!-- PRODUCT MODAL -->
  <div id="productModal" class="modal-overlay">
    <div class="modal-content">
      <button class="modal-close" onclick="closeModal()"><i class="bi bi-x-circle"></i></button>
      <div class="modal-image">🥜</div>
      <div class="modal-body p-3" style="background-color: black; color: white;">
        <div id="modalTag" class="modal-tag"></div>
        <div id="modalName" class="modal-name"></div>
        <div id="modalDesc" class="modal-desc"></div>
        <div class="modal-price-row">
          <span id="modalPrice" class="modal-price"></span>
          <span id="modalMrp" class="modal-mrp"></span>
          <span id="modalDiscount" class="modal-discount"></span>
        </div>
        <button class="btn-add-cart" onclick="modalAddToCart()">Add to Cart</button>
      </div>
    </div>
  </div>

  <!-- JS (Bootstrap Bundle for Carousel to work) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js"></script>

</body>
</html>
